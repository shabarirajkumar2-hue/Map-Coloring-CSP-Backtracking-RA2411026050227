<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Map Coloring CSP Solver</title>
<meta name="description" content="Create an account on the Map Coloring CSP Solver dashboard.">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🧩</div>
      <h1>Create Account</h1>
      <p>Join the CSP Map Solver platform</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/register">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input id="name" name="name" type="text" class="form-control" placeholder="e.g. Arjun Sharma" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input id="username" name="username" type="text" class="form-control" placeholder="Choose a unique username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" name="password" type="password" class="form-control" placeholder="Create a password" required autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm_password">Confirm Password</label>
        <input id="confirm_password" name="confirm_password" type="password" class="form-control" placeholder="Repeat your password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;">
        ✨ Create Account
      </button>
    </form>

    <div class="auth-divider" style="margin-top:20px;">or</div>
    <p style="text-align:center;font-size:13px;color:var(--text-muted);margin-top:14px;">
      Already have an account?
      <a href="/login" style="color:var(--accent2);font-weight:600;">Sign in here</a>
    </p>
  </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
