<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Map Coloring CSP Solver</title>
<meta name="description" content="Login to the Map Coloring CSP Solver AI dashboard.">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🗺️</div>
      <h1>CSP Map Solver</h1>
      <p>Constraint Satisfaction Problem Dashboard</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input id="username" name="username" type="text" class="form-control" placeholder="Enter your username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" name="password" type="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;">
        🚀 Sign In
      </button>
    </form>

    <div class="auth-divider" style="margin-top:20px;">or</div>
    <p style="text-align:center;font-size:13px;color:var(--text-muted);margin-top:14px;">
      Don't have an account?
      <a href="/register" style="color:var(--accent2);font-weight:600;">Register here</a>
    </p>
  </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
